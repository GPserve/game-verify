<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Fairness Verification | GanPlay Provably Fair</title>
  <meta name="description" content="GanPlay Flip Provably Fair player self-service verification. Enter Server Seed / Client Seed / Nonce / Round to verify the result of the round.">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1 class="site-title">Flip Fairness Verification</h1>
      <p class="site-subtitle">GanPlay Provably Fair Player Self-Service Verification</p>
    </header>

    <main class="site-main">
      <section class="verify-card">
        <form class="verify-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="server-seed">Server Seed</label>
            <input
              class="form-input"
              type="text"
              id="server-seed"
              name="server-seed"
              placeholder="Enter the Server Seed for this round"
              autocomplete="off"
              spellcheck="false"
            >
            <span class="form-error" id="server-seed-error" hidden>Server Seed is required</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="client-seed">Client Seed</label>
            <input
              class="form-input"
              type="text"
              id="client-seed"
              name="client-seed"
              placeholder="Enter the Client Seed for this round"
              autocomplete="off"
              spellcheck="false"
            >
            <span class="form-error" id="client-seed-error" hidden>Client Seed is required</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="nonce">Nonce</label>
            <input
              class="form-input"
              type="number"
              id="nonce"
              name="nonce"
              placeholder="Enter the round number (Nonce)"
              step="1"
              min="0"
              value="0"
            >
            <span class="form-error" id="nonce-error" hidden>Nonce is required</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="round">Round</label>
            <input
              class="form-input"
              type="number"
              id="round"
              name="round"
              placeholder="Enter the flip round (1-based)"
              step="1"
              min="1"
              max="20"
              value="1"
            >
            <span class="form-error" id="round-error" hidden>Round is required</span>
          </div>

          <button class="verify-button" type="submit">Verify / Calculate</button>
        </form>
      </section>

      <section class="result-card" id="result-card" hidden>
        <p class="result-label">Flip Results</p>
        <ol class="result-list" id="flip-result-list"></ol>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 GanPlay. All rights reserved.</p>
    </footer>
  </div>

  <script src="assets/js/flip.js"></script>
  <script>
    (() => {
      const serverSeedInput = document.getElementById("server-seed");
      const clientSeedInput = document.getElementById("client-seed");
      const nonceInput = document.getElementById("nonce");
      const roundInput = document.getElementById("round");
      const resultListEl = document.getElementById("flip-result-list");
      const resultCardEl = document.getElementById("result-card");
      const serverSeedErrorEl = document.getElementById("server-seed-error");
      const clientSeedErrorEl = document.getElementById("client-seed-error");
      const nonceErrorEl = document.getElementById("nonce-error");
      const roundErrorEl = document.getElementById("round-error");
      const formEl = document.querySelector(".verify-form");

      // 每次觸發計算給予遞增 token，僅套用最新一次計算結果，
      // 避免快速連續送出時較舊的非同步計算覆蓋較新的結果。
      let latestToken = 0;

      const parseIntField = (rawValue, fallback) => {
        const parsed = Math.trunc(Number(rawValue));
        return Number.isFinite(parsed) ? parsed : fallback;
      };

      const hideResult = () => {
        resultCardEl.hidden = true;
        resultListEl.replaceChildren();
      };

      const validateRequired = (serverSeed, clientSeed, nonceRaw, roundRaw) => {
        const serverSeedMissing = serverSeed === "";
        const clientSeedMissing = clientSeed === "";
        const nonceMissing = nonceRaw === "";
        const roundMissing = roundRaw === "";

        serverSeedErrorEl.hidden = !serverSeedMissing;
        clientSeedErrorEl.hidden = !clientSeedMissing;
        nonceErrorEl.hidden = !nonceMissing;
        roundErrorEl.hidden = !roundMissing;

        serverSeedInput.classList.toggle("is-invalid", serverSeedMissing);
        clientSeedInput.classList.toggle("is-invalid", clientSeedMissing);
        nonceInput.classList.toggle("is-invalid", nonceMissing);
        roundInput.classList.toggle("is-invalid", roundMissing);

        return (
          !serverSeedMissing && !clientSeedMissing && !nonceMissing && !roundMissing
        );
      };

      const recompute = async () => {
        const serverSeed = serverSeedInput.value;
        const clientSeed = clientSeedInput.value;
        const nonceRaw = nonceInput.value;
        const roundRaw = roundInput.value;

        // 空值必填驗證：任一欄位為空字串即擋下（不觸發 HMAC 計算），
        // 以字串層面判空，數值 0（nonce）為合法值不擋，確保結果區塊不殘留舊值。
        if (!validateRequired(serverSeed, clientSeed, nonceRaw, roundRaw)) {
          hideResult();
          return;
        }

        const token = ++latestToken;
        const nonce = parseIntField(nonceRaw, 0);
        const roundCount = parseIntField(roundRaw, 1);

        // nonce 於整串計算中固定不變，逐一對 round = 1..N 呼叫
        // GanFlip.computeFlipResult，收集每一局結果供玩家對照整串注單。
        const rounds = Array.from({ length: roundCount }, (_, i) => i + 1);
        const results = await Promise.all(
          rounds.map((round) =>
            GanFlip.computeFlipResult(serverSeed, clientSeed, nonce, round),
          ),
        );

        // 整批結果套用最新 token，避免快速連續送出時較舊的非同步
        // 計算覆蓋較新的結果。
        if (token !== latestToken) return;

        const items = rounds.map((round, i) => {
          const resultText = results[i] === 0 ? "Heads (0)" : "Tails (1)";
          const li = document.createElement("li");
          li.className = "result-list-item";

          const roundSpan = document.createElement("span");
          roundSpan.className = "result-list-round";
          roundSpan.textContent = `Round ${round}`;

          const valueSpan = document.createElement("span");
          valueSpan.className = "result-list-value";
          valueSpan.textContent = resultText;

          li.append(roundSpan, valueSpan);
          return li;
        });

        resultListEl.replaceChildren(...items);
        resultCardEl.hidden = false;
      };

      formEl.addEventListener("submit", (event) => {
        event.preventDefault();
        recompute();
      });
    })();
  </script>
</body>
</html>
