<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mines Fairness Verification | GanPlay Provably Fair</title>
  <meta name="description" content="GanPlay Mines Provably Fair player self-service verification. Enter Server Seed / Client Seed / Nonce / Mine Count to verify the mine positions of the round.">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1 class="site-title">Mines Fairness Verification</h1>
      <p class="site-subtitle">GanPlay Provably Fair Player Self-Service Verification</p>
    </header>

    <main class="site-main">
      <section class="verify-card">
        <form class="verify-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="server-seed">Server Seed</label>
            <input
              class="form-input"
              type="text"
              id="server-seed"
              name="server-seed"
              placeholder="Enter the Server Seed for this round"
              autocomplete="off"
              spellcheck="false"
            >
            <span class="form-error" id="server-seed-error" hidden>Server Seed is required</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="client-seed">Client Seed</label>
            <input
              class="form-input"
              type="text"
              id="client-seed"
              name="client-seed"
              placeholder="Enter the Client Seed for this round"
              autocomplete="off"
              spellcheck="false"
            >
            <span class="form-error" id="client-seed-error" hidden>Client Seed is required</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="nonce">Nonce</label>
            <input
              class="form-input"
              type="number"
              id="nonce"
              name="nonce"
              placeholder="Enter the round number (Nonce)"
              step="1"
              min="0"
              value="0"
            >
            <span class="form-error" id="nonce-error" hidden>Nonce is required</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="mine-count">Mine Count</label>
            <input
              class="form-input"
              type="number"
              id="mine-count"
              name="mine-count"
              placeholder="Enter the number of mines"
              step="1"
              min="1"
              max="24"
              value="3"
            >
            <span class="form-error" id="mine-count-error" hidden>Mine Count is required</span>
          </div>

          <button class="verify-button" type="submit">Verify / Calculate</button>
        </form>
      </section>

      <section class="result-card" id="result-card" hidden>
        <p class="result-label">Mine Positions</p>
        <p class="result-value" id="mine-positions-result">--</p>
        <p class="result-label">Full Order (25)</p>
        <p class="result-value" id="full-order-result">--</p>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 GanPlay. All rights reserved.</p>
    </footer>
  </div>

  <script src="../assets/js/mines.js"></script>
  <script>
    (() => {
      const serverSeedInput = document.getElementById("server-seed");
      const clientSeedInput = document.getElementById("client-seed");
      const nonceInput = document.getElementById("nonce");
      const mineCountInput = document.getElementById("mine-count");
      const minePositionsResultEl = document.getElementById("mine-positions-result");
      const fullOrderResultEl = document.getElementById("full-order-result");
      const resultCardEl = document.getElementById("result-card");
      const serverSeedErrorEl = document.getElementById("server-seed-error");
      const clientSeedErrorEl = document.getElementById("client-seed-error");
      const nonceErrorEl = document.getElementById("nonce-error");
      const mineCountErrorEl = document.getElementById("mine-count-error");
      const formEl = document.querySelector(".verify-form");

      // 每次觸發計算給予遞增 token，僅套用最新一次計算結果，
      // 避免快速連續送出時較舊的非同步計算覆蓋較新的結果。
      let latestToken = 0;

      const parseIntField = (rawValue, fallback) => {
        const parsed = Math.trunc(Number(rawValue));
        return Number.isFinite(parsed) ? parsed : fallback;
      };

      const hideResult = () => {
        resultCardEl.hidden = true;
        minePositionsResultEl.textContent = "--";
        fullOrderResultEl.textContent = "--";
      };

      const validateRequired = (serverSeed, clientSeed, nonceRaw, mineCountRaw) => {
        const serverSeedMissing = serverSeed === "";
        const clientSeedMissing = clientSeed === "";
        const nonceMissing = nonceRaw === "";
        const mineCountMissing = mineCountRaw === "";

        serverSeedErrorEl.hidden = !serverSeedMissing;
        clientSeedErrorEl.hidden = !clientSeedMissing;
        nonceErrorEl.hidden = !nonceMissing;
        mineCountErrorEl.hidden = !mineCountMissing;

        serverSeedInput.classList.toggle("is-invalid", serverSeedMissing);
        clientSeedInput.classList.toggle("is-invalid", clientSeedMissing);
        nonceInput.classList.toggle("is-invalid", nonceMissing);
        mineCountInput.classList.toggle("is-invalid", mineCountMissing);

        return (
          !serverSeedMissing &&
          !clientSeedMissing &&
          !nonceMissing &&
          !mineCountMissing
        );
      };

      const recompute = async () => {
        const serverSeed = serverSeedInput.value;
        const clientSeed = clientSeedInput.value;
        const nonceRaw = nonceInput.value;
        const mineCountRaw = mineCountInput.value;

        // 空值必填驗證：任一欄位為空字串即擋下（不觸發 HMAC 計算），
        // 以字串層面判空，數值 0（nonce）為合法值不擋，確保結果區塊不殘留舊值。
        if (!validateRequired(serverSeed, clientSeed, nonceRaw, mineCountRaw)) {
          hideResult();
          return;
        }

        const token = ++latestToken;
        const nonce = parseIntField(nonceRaw, 0);
        const mineCount = parseIntField(mineCountRaw, 3);

        const { result, minePositions } = await GanMines.computeMinesResult(
          serverSeed,
          clientSeed,
          nonce,
          mineCount,
        );

        if (token !== latestToken) return;
        minePositionsResultEl.textContent = minePositions.join(", ");
        fullOrderResultEl.textContent = result.join(", ");
        resultCardEl.hidden = false;
      };

      formEl.addEventListener("submit", (event) => {
        event.preventDefault();
        recompute();
      });
    })();
  </script>
</body>
</html>
